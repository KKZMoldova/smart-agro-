<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Журнал работ — Smart Agro</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:sans-serif;background:#f5f4f0;color:#1a1a18}
.header{background:#fff;border-bottom:1px solid #e2e0d8;padding:0 20px;display:flex;align-items:center;height:52px;gap:12px}
.logo{font-weight:700;color:#1d6a4a;font-size:15px;margin-right:16px}
.header h1{font-size:15px;font-weight:600;flex:1}
.btn{padding:7px 14px;font-size:13px;border-radius:7px;border:1px solid #e2e0d8;background:#fff;cursor:pointer;text-decoration:none;color:#1a1a18;display:inline-block}
.btn-g{background:#1d6a4a;color:#fff;border-color:#1d6a4a}
.btn-r{background:#fdecea;color:#c0392b;border-color:#f5c6c2}
.btn-a{background:#fef3e2;color:#b85c00;border-color:#f5c6a0}
.filters{padding:10px 20px;display:flex;gap:6px;background:#fff;border-bottom:1px solid #e2e0d8;flex-wrap:wrap}
.fb{padding:4px 12px;font-size:12px;border-radius:20px;border:1px solid #e2e0d8;background:none;cursor:pointer}
.fb.active{background:#1d6a4a;color:#fff;border-color:#1d6a4a}
.main{padding:16px 20px;max-width:860px;margin:0 auto}
.card{background:#fff;border:1px solid #e2e0d8;border-radius:10px;padding:14px 18px;margin-bottom:10px}
.card.s-new{border-left:3px solid #378add}
.card.s-accepted{border-left:3px solid #b85c00}
.card.s-in_progress{border-left:3px solid #2d9566}
.card.s-done{border-left:3px solid #639922}
.card.s-closed{border-left:3px solid #b4b2a9}
.card.s-problem{border-left:3px solid #c0392b}
.card-title{font-size:15px;font-weight:600;margin-bottom:3px}
.card-sub{font-size:12px;color:#6b6a64}
.badge{display:inline-block;padding:2px 8px;border-radius:20px;font-size:11px;font-weight:600;margin-right:4px;margin-top:6px}
.b-blue{background:#e8f1f8;color:#1a4f7a}
.b-amber{background:#fef3e2;color:#b85c00}
.b-green{background:#e8f4ee;color:#1d6a4a}
.b-gray{background:#f0efe9;color:#6b6a64}
.b-red{background:#fdecea;color:#c0392b}
.b-lime{background:#eaf3de;color:#27500a}
.hr{border-top:1px solid #e2e0d8;margin:10px 0}
.grid{display:grid;grid-template-columns:repeat(4,1fr);gap:8px;font-size:12px}
.grid .l{color:#6b6a64;margin-bottom:2px;font-size:11px}
.grid .v{font-weight:500}
.actions{display:flex;gap:6px;flex-wrap:wrap;margin-top:10px}
.prob{background:#fdecea;border:1px solid #f5c6c2;border-radius:7px;padding:8px 12px;margin-top:8px;font-size:13px;color:#c0392b}
.empty{text-align:center;padding:60px 20px;color:#6b6a64}
.overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,0.4);z-index:100;align-items:center;justify-content:center;padding:16px}
.overlay.open{display:flex}
.modal{background:#fff;border-radius:12px;padding:22px;width:100%;max-width:560px;max-height:90vh;overflow-y:auto;box-shadow:0 20px 60px rgba(0,0,0,0.15)}
.modal h2{font-size:16px;font-weight:600;margin-bottom:16px}
.fg{margin-bottom:12px}
.fg label{display:block;font-size:11px;font-weight:600;color:#6b6a64;margin-bottom:4px;text-transform:uppercase}
.fg select,.fg input,.fg textarea{width:100%;padding:8px 10px;border:1px solid #e2e0d8;border-radius:7px;font-size:13px;background:#f5f4f0;outline:none}
.fg select:focus,.fg input:focus{border-color:#2d9566}
.row2{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.sec{font-size:11px;font-weight:600;color:#6b6a64;text-transform:uppercase;letter-spacing:.5px;margin:14px 0 8px}
.mf{display:flex;gap:8px;justify-content:flex-end;margin-top:16px;padding-top:14px;border-top:1px solid #e2e0d8}
.toast{position:fixed;bottom:20px;right:20px;background:#1a1a18;color:#fff;padding:9px 16px;border-radius:7px;font-size:13px;z-index:200;opacity:0;transition:all .2s;pointer-events:none}
.toast.show{opacity:1}
</style>
</head>
<body>
<div class="header">
  <div class="logo">SmartAgro</div>
  <h1>Журнал работ</h1>
  <a class="btn" href="/staff-equipment.html">👥 Справочники</a>
  <a class="btn" href="/vegetable">🌿 Vegetable</a>
  <button class="btn btn-g" id="new-btn">+ Новое задание</button>
</div>
<div class="filters">
  <button class="fb active" onclick="filt('all',this)">Все <span id="ca">0</span></button>
  <button class="fb" onclick="filt('new',this)">Новые <span id="cn">0</span></button>
  <button class="fb" onclick="filt('accepted',this)">Принято <span id="cac">0</span></button>
  <button class="fb" onclick="filt('in_progress',this)">В работе <span id="cip">0</span></button>
  <button class="fb" onclick="filt('done',this)">Выполнено <span id="cd">0</span></button>
  <button class="fb" onclick="filt('problem',this)">Проблемы <span id="cp">0</span></button>
  <button class="fb" onclick="filt('closed',this)">Закрыто <span id="cc">0</span></button>
</div>
<div class="main"><div id="list"></div></div>

<div class="overlay" id="m-task">
<div class="modal">
  <h2>Новое задание</h2>
  <div id="m-loading" style="color:#999;text-align:center;padding:20px">Загрузка данных...</div>
  <div id="m-form" style="display:none">
    <div class="sec">Что делать</div>
    <div class="row2">
      <div class="fg"><label>Тип работы *</label><select id="f-wt"></select></div>
      <div class="fg"><label>Участок</label><select id="f-par"></select></div>
    </div>
    <div class="fg"><label>Описание / инструкция</label><textarea id="f-desc" rows="2"></textarea></div>
    <div class="fg"><label>Срок</label><input type="date" id="f-due"></div>
    <div class="sec">Кто выполняет</div>
    <div class="row2">
      <div class="fg"><label>Создал (агроном) *</label><select id="f-cr"></select></div>
      <div class="fg"><label>Исполнитель *</label><select id="f-as"></select></div>
    </div>
    <div class="fg"><label>Механизатор</label><select id="f-me"></select></div>
    <div class="sec">Техника</div>
    <div class="row2">
      <div class="fg"><label>Техника</label><select id="f-eq"></select></div>
      <div class="fg"><label>Навесное / прицепное</label><select id="f-at"></select></div>
    </div>
    <div class="fg"><label>Примечание</label><input type="text" id="f-no"></div>
    <div class="mf">
      <button class="btn" id="cancel-btn">Отмена</button>
      <button class="btn btn-g" id="save-btn">Создать + отправить в Telegram</button>
    </div>
  </div>
</div>
</div>

<div class="overlay" id="m-prob">
<div class="modal" style="max-width:400px">
  <h2>⚠️ Сообщить о проблеме</h2>
  <input type="hidden" id="prob-id">
  <div class="fg"><label>Опишите проблему</label><textarea id="prob-txt" rows="3" style="background:#f5f4f0"></textarea></div>
  <div class="mf">
    <button class="btn" id="prob-cancel">Отмена</button>
    <button class="btn btn-r" id="prob-save">Отправить в Telegram</button>
  </div>
</div>
</div>

<div class="toast" id="toast"></div>

<script>
const SL={new:'Новое',accepted:'Принято',in_progress:'В работе',done:'Выполнено',closed:'Закрыто',problem:'Проблема'};
const SB={new:'b-blue',accepted:'b-amber',in_progress:'b-green',done:'b-lime',closed:'b-gray',problem:'b-red'};
let tasks=[],cf='all';

function toast(m){const t=document.getElementById('toast');t.textContent=m;t.classList.add('show');setTimeout(()=>t.classList.remove('show'),2500);}
function filt(f,el){cf=f;document.querySelectorAll('.fb').forEach(b=>b.classList.remove('active'));el.classList.add('active');render();}

function counts(){
  document.getElementById('ca').textContent=tasks.length;
  ['new','accepted','in_progress','done','problem','closed'].forEach((s,i)=>{
    const ids=['cn','cac','cip','cd','cp','cc'];
    document.getElementById(ids[i]).textContent=tasks.filter(t=>t.status===s).length;
  });
}

function fd(d){return d?new Date(d).toLocaleDateString('ru-RU'):'—';}

function actions(t){
  let h='';
  if(t.status==='new'){
    h+=`<button class="btn" onclick="st('${t.id}','accepted',{})">✓ Принять</button>`;
    h+=`<button class="btn btn-a" onclick="openProb('${t.id}')">⚠️ Проблема</button>`;
  }
  if(t.status==='accepted'){
    h+=`<button class="btn btn-g" onclick="st('${t.id}','in_progress',{})">▶ Начать работу</button>`;
    h+=`<button class="btn btn-a" onclick="openProb('${t.id}')">⚠️ Проблема</button>`;
  }
  if(t.status==='in_progress'){
    h+=`<button class="btn btn-g" onclick="doneTask('${t.id}')">✅ Подтвердить выполнение</button>`;
    h+=`<button class="btn btn-a" onclick="openProb('${t.id}')">⚠️ Проблема</button>`;
  }
  if(t.status==='done'||t.status==='problem'){
    h+=`<button class="btn" onclick="st('${t.id}','closed',{closed_by_name:'Агроном'})">Закрыть (агроном)</button>`;
  }
  return h;
}

function render(){
  const f=cf==='all'?tasks:tasks.filter(t=>t.status===cf);
  const el=document.getElementById('list');
  if(!f.length){el.innerHTML='<div class="empty"><div style="font-size:40px;margin-bottom:12px">📋</div><p>Заданий нет. Нажмите + Новое задание</p></div>';return;}
  el.innerHTML=f.map(t=>`
  <div class="card s-${t.status}">
    <div class="card-title">${t.work_type_name||'Работа'}</div>
    <div class="card-sub">${t.parcel_name||''} ${t.description?'· '+t.description.slice(0,60):''}</div>
    <div>
      <span class="badge ${SB[t.status]||'b-gray'}">${SL[t.status]||t.status}</span>
      ${t.due_date?`<span class="badge b-amber">До ${fd(t.due_date)}</span>`:''}
      ${t.telegram_sent?`<span class="badge b-gray">✈️ Telegram</span>`:''}
    </div>
    <div class="hr"></div>
    <div class="grid">
      <div><div class="l">Создал</div><div class="v">${t.created_by_name||'—'}</div></div>
      <div><div class="l">Исполнитель</div><div class="v">${t.assigned_to_name||'—'}</div></div>
      <div><div class="l">Техника</div><div class="v">${t.equipment_name||'—'}</div></div>
      <div><div class="l">Навесное</div><div class="v">${t.attachment||'—'}</div></div>
      ${t.mechanic_name?`<div><div class="l">Механизатор</div><div class="v">${t.mechanic_name}</div></div>`:''}
      ${t.closed_by_name?`<div><div class="l">Закрыл</div><div class="v">${t.closed_by_name}</div></div>`:''}
    </div>
    ${t.problem_note?`<div class="prob">⚠️ ${t.problem_note}</div>`:''}
    <div class="actions">${actions(t)}</div>
  </div>`).join('');
}

async function load(){
  const r=await fetch('/api/tasks');
  tasks=await r.json();
  counts();render();
}

async function st(id,status,extra){
  await fetch(`/api/tasks/${id}/status`,{method:'PATCH',headers:{'Content-Type':'application/json'},body:JSON.stringify({status,...extra})});
  toast('Статус обновлён');load();
}

async function doneTask(id){
  const n=prompt('Ваше имя (кто подтверждает):');
  if(!n)return;
  await st(id,'done',{closed_by_name:n});
}

function openProb(id){
  document.getElementById('prob-id').value=id;
  document.getElementById('prob-txt').value='';
  document.getElementById('m-prob').classList.add('open');
}

document.getElementById('prob-cancel').onclick=function(){document.getElementById('m-prob').classList.remove('open');};
document.getElementById('prob-save').onclick=async function(){
  const id=document.getElementById('prob-id').value;
  const note=document.getElementById('prob-txt').value.trim();
  if(!note){alert('Опишите проблему');return;}
  await st(id,'problem',{problem_note:note});
  document.getElementById('m-prob').classList.remove('open');
  toast('Проблема отправлена в Telegram');
};

document.getElementById('new-btn').onclick=async function(){
  document.getElementById('m-task').classList.add('open');
  document.getElementById('m-loading').style.display='block';
  document.getElementById('m-form').style.display='none';
  document.getElementById('f-desc').value='';
  document.getElementById('f-no').value='';
  document.getElementById('f-due').value='';
  try{
    const staff=await fetch('/api/staff').then(r=>r.json());
    const equip=await fetch('/api/equipment').then(r=>r.json());
    const attach=await fetch('/api/attachments').then(r=>r.json());
    const wt=await fetch('/api/work-types').then(r=>r.json());
    let parcels=[];
    try{const pd=await fetch('/api/parcels').then(r=>r.json());parcels=Array.isArray(pd)?pd:(pd.data||[]);}catch(e){}

    document.getElementById('f-wt').innerHTML=wt.map(w=>`<option value="${w.id}" data-name="${w.name}">${w.name}</option>`).join('');
    document.getElementById('f-par').innerHTML='<option value="">— не выбран —</option>'+parcels.map(p=>`<option value="${p.id}" data-name="${p.name}">${p.name}</option>`).join('');
    document.getElementById('f-cr').innerHTML=staff.map(s=>`<option value="${s.id}" data-name="${s.name}">${s.name} (${s.role})</option>`).join('');
    document.getElementById('f-as').innerHTML=staff.map(s=>`<option value="${s.id}" data-name="${s.name}">${s.name} (${s.role})</option>`).join('');
    document.getElementById('f-me').innerHTML='<option value="">— не назначен —</option>'+staff.map(s=>`<option value="${s.id}" data-name="${s.name}">${s.name}</option>`).join('');
    document.getElementById('f-eq').innerHTML='<option value="">— не выбрана —</option>'+equip.map(e=>`<option value="${e.id}" data-name="${e.name}">${e.name}</option>`).join('');
    document.getElementById('f-at').innerHTML='<option value="">— не выбрано —</option>'+attach.map(a=>`<option value="${a.id}" data-name="${a.name}">${a.name}</option>`).join('');

    document.getElementById('m-loading').style.display='none';
    document.getElementById('m-form').style.display='block';
  }catch(e){document.getElementById('m-loading').textContent='Ошибка: '+e.message;}
};

document.getElementById('cancel-btn').onclick=function(){document.getElementById('m-task').classList.remove('open');};

function gsel(id){
  const s=document.getElementById(id);
  if(!s||!s.value)return{id:null,name:null};
  return{id:s.value,name:s.options[s.selectedIndex].dataset.name||s.options[s.selectedIndex].textContent};
}

document.getElementById('save-btn').onclick=async function(){
  const cr=gsel('f-cr'),as_=gsel('f-as');
  if(!cr.id||!as_.id){alert('Выберите создателя и исполнителя');return;}
  const body={
    work_type_id:gsel('f-wt').id,work_type_name:gsel('f-wt').name,
    description:document.getElementById('f-desc').value.trim(),
    parcel_id:gsel('f-par').id,parcel_name:gsel('f-par').name,
    created_by_id:cr.id,created_by_name:cr.name,
    assigned_to_id:as_.id,assigned_to_name:as_.name,
    mechanic_id:gsel('f-me').id,mechanic_name:gsel('f-me').name,
    equipment_id:gsel('f-eq').id,equipment_name:gsel('f-eq').name,
    attachment:gsel('f-at').name,
    due_date:document.getElementById('f-due').value||null,
    note:document.getElementById('f-no').value.trim()
  };
  const r=await fetch('/api/tasks',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify(body)});
  if(r.ok){document.getElementById('m-task').classList.remove('open');toast('Задание создано и отправлено в Telegram! ✈️');load();}
  else{const e=await r.json();alert('Ошибка: '+e.error);}
};

load();
</script>
</body>
</html>
