<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Smart Agro — Администратор</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{min-height:100vh;background:#0a0f0a;font-family:'Inter',system-ui,sans-serif;color:#e2e8e2}
.topbar{background:#111811;border-bottom:1px solid #1e2e1e;padding:0 24px;height:56px;display:flex;align-items:center;justify-content:space-between;}
.topbar h1{font-size:16px;font-weight:700;color:#4ade80;}
.topbar-right{display:flex;align-items:center;gap:12px;font-size:12px;color:#6b7a6b;}
.main{max-width:1100px;margin:0 auto;padding:24px 16px;}
.tabs{display:flex;gap:4px;margin-bottom:24px;border-bottom:1px solid #1e2e1e;}
.tab{padding:8px 18px;border:none;background:transparent;color:#6b7a6b;font-size:13px;cursor:pointer;border-bottom:2px solid transparent;transition:all .2s;}
.tab.active{color:#4ade80;border-bottom-color:#4ade80;font-weight:600;}
.panel{display:none;} .panel.active{display:block;}
.card{background:#111811;border:1px solid #1e2e1e;border-radius:12px;padding:20px;margin-bottom:12px;}
.card-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:16px;}
.card-title{font-size:14px;font-weight:700;}
.badge{padding:2px 8px;border-radius:6px;font-size:11px;font-weight:600;}
.badge-pro{background:rgba(74,222,128,.15);color:#4ade80;}
.badge-basic{background:rgba(107,114,128,.15);color:#9ca3af;}
.grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(320px,1fr));gap:12px;}
.form-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;}
.ff{display:flex;flex-direction:column;gap:4px;}
.ff.full{grid-column:1/-1;}
label{font-size:11px;color:#8a9a8a;font-weight:500;}
input,select{padding:8px 12px;background:#0d140d;border:1px solid #1e2e1e;border-radius:8px;color:#e2e8e2;font-size:13px;width:100%;outline:none;transition:border-color .2s;}
input:focus,select:focus{border-color:#4ade80;}
input::placeholder{color:#3a4a3a;}
.btn{padding:7px 16px;border-radius:8px;border:none;font-size:12px;font-weight:600;cursor:pointer;transition:all .2s;}
.btn-primary{background:#4ade80;color:#051005;}
.btn-primary:hover{background:#22c55e;}
.btn-secondary{background:transparent;border:1px solid #1e2e1e;color:#8a9a8a;}
.btn-secondary:hover{border-color:#4ade80;color:#4ade80;}
.btn-danger{background:transparent;border:1px solid rgba(239,68,68,.3);color:#f87171;}
.btn-sm{padding:4px 10px;font-size:11px;}
.stat{text-align:center;padding:12px;background:#0d140d;border-radius:8px;}
.stat-val{font-size:22px;font-weight:700;color:#4ade80;font-family:'Unbounded',sans-serif;}
.stat-lbl{font-size:10px;color:#6b7a6b;margin-top:2px;}
.stats-row{display:grid;grid-template-columns:repeat(4,1fr);gap:8px;margin-bottom:20px;}
.user-row{display:flex;align-items:center;gap:10px;padding:8px 12px;border-radius:8px;background:#0d140d;margin-bottom:6px;}
.user-avatar{width:32px;height:32px;border-radius:50%;background:#1e2e1e;display:flex;align-items:center;justify-content:center;font-size:14px;flex-shrink:0;}
.role-badge{padding:1px 7px;border-radius:4px;font-size:10px;font-weight:600;}
.role-owner{background:rgba(234,179,8,.15);color:#eab308;}
.role-agronomist{background:rgba(74,222,128,.15);color:#4ade80;}
.role-director{background:rgba(96,165,250,.15);color:#60a5fa;}
.role-operator{background:rgba(107,114,128,.15);color:#9ca3af;}
.error{background:rgba(239,68,68,.08);border:1px solid rgba(239,68,68,.2);color:#f87171;border-radius:8px;padding:8px 12px;font-size:12px;margin-bottom:10px;}
.success{background:rgba(74,222,128,.08);border:1px solid rgba(74,222,128,.2);color:#4ade80;border-radius:8px;padding:8px 12px;font-size:12px;margin-bottom:10px;}
.modal-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.7);z-index:100;align-items:center;justify-content:center;}
.modal-overlay.open{display:flex;}
.modal{background:#111811;border:1px solid #1e2e1e;border-radius:16px;padding:24px;width:100%;max-width:500px;max-height:90vh;overflow-y:auto;}
.modal h2{font-size:16px;font-weight:700;margin-bottom:20px;}
.modal-footer{display:flex;gap:8px;justify-content:flex-end;margin-top:20px;}
</style>
</head>
<body>

<div class="topbar">
  <h1>🌿 Smart Agro — Панель администратора</h1>
  <div class="topbar-right">
    <span id="admin-name"></span>
    <button class="btn btn-secondary btn-sm" onclick="logout()">Выйти</button>
  </div>
</div>

<div class="main">
  <div class="tabs">
    <button class="tab active" onclick="switchTab('tenants',this)">🏢 Хозяйства</button>
    <button class="tab" onclick="switchTab('users',this)">👥 Пользователи</button>
    <button class="tab" onclick="switchTab('stats',this)">📊 Статистика</button>
  </div>

  <!-- TENANTS -->
  <div id="panel-tenants" class="panel active">
    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:16px;">
      <div style="font-size:13px;color:#6b7a6b;" id="tenants-count">Загрузка...</div>
      <button class="btn btn-primary" onclick="openTenantModal()">+ Добавить хозяйство</button>
    </div>
    <div id="tenants-msg"></div>
    <div class="grid" id="tenants-grid"></div>
  </div>

  <!-- USERS -->
  <div id="panel-users" class="panel">
    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:16px;">
      <select id="users-tenant-filter" onchange="loadUsers()" style="width:220px;">
        <option value="">Все хозяйства</option>
      </select>
      <button class="btn btn-primary" onclick="openUserModal()">+ Добавить пользователя</button>
    </div>
    <div id="users-msg"></div>
    <div id="users-list"></div>
  </div>

  <!-- STATS -->
  <div id="panel-stats" class="panel">
    <div class="card">
      <div class="card-title" style="margin-bottom:16px;">📊 Общая статистика системы</div>
      <div class="stats-row" id="stats-grid">
        <div class="stat"><div class="stat-val" id="stat-tenants">—</div><div class="stat-lbl">Хозяйств</div></div>
        <div class="stat"><div class="stat-val" id="stat-users">—</div><div class="stat-lbl">Пользователей</div></div>
        <div class="stat"><div class="stat-val" id="stat-active">—</div><div class="stat-lbl">Активных</div></div>
        <div class="stat"><div class="stat-val" id="stat-pro">—</div><div class="stat-lbl">Pro план</div></div>
      </div>
    </div>
  </div>
</div>

<!-- MODAL: Добавить/редактировать хозяйство -->
<div class="modal-overlay" id="modal-tenant">
  <div class="modal">
    <h2 id="tenant-modal-title">🏢 Новое хозяйство</h2>
    <input type="hidden" id="t-id-edit">
    <div id="tenant-msg"></div>
    <div class="form-grid">
      <div class="ff"><label>ID хозяйства (латиница, без пробелов)</label>
        <input type="text" id="t-id" placeholder="farm1" pattern="[a-z0-9_]+"></div>
      <div class="ff"><label>Название</label>
        <input type="text" id="t-name" placeholder="Агрофирма Молдова"></div>
      <div class="ff"><label>План</label>
        <select id="t-plan">
          <option value="basic">Basic</option>
          <option value="pro">Pro</option>
        </select>
      </div>
      <div class="ff"><label>Станция орчарда (FieldClimate)</label>
        <input type="text" id="t-fc-orchard" placeholder="00002158"></div>
      <div class="ff"><label>Станция овощей (FieldClimate)</label>
        <input type="text" id="t-fc-veg" placeholder="0020BCDC"></div>
      <div class="ff"><label>Широта (lat)</label>
        <input type="number" id="t-lat" step="0.001" placeholder="47.000"></div>
      <div class="ff"><label>Долгота (lon)</label>
        <input type="number" id="t-lon" step="0.001" placeholder="28.500"></div>
      <div class="ff full" id="owner-section">
        <label style="color:#4ade80;font-size:12px;margin-bottom:6px;">👤 Владелец (создаётся автоматически)</label>
        <div class="form-grid">
          <div class="ff"><label>Логин владельца</label>
            <input type="text" id="t-owner-login" placeholder="farm1_owner"></div>
          <div class="ff"><label>Пароль владельца</label>
            <input type="password" id="t-owner-pw" placeholder="минимум 6 символов"></div>
        </div>
      </div>
    </div>
    <div class="modal-footer">
      <button class="btn btn-secondary" onclick="closeTenantModal()">Отмена</button>
      <button class="btn btn-primary" onclick="saveTenant()">Сохранить</button>
    </div>
  </div>
</div>

<!-- MODAL: Добавить/редактировать пользователя -->
<div class="modal-overlay" id="modal-user">
  <div class="modal">
    <h2 id="user-modal-title">👤 Новый пользователь</h2>
    <input type="hidden" id="u-id">
    <div id="user-msg"></div>
    <div class="form-grid">
      <div class="ff"><label>Хозяйство</label>
        <select id="u-tenant"></select></div>
      <div class="ff"><label>Роль</label>
        <select id="u-role">
          <option value="owner">Владелец</option>
          <option value="agronomist">Агроном</option>
          <option value="director">Директор</option>
          <option value="operator">Оператор</option>
        </select>
      </div>
      <div class="ff"><label>Имя</label>
        <input type="text" id="u-name" placeholder="Иван Петров"></div>
      <div class="ff"><label>Логин</label>
        <input type="text" id="u-login" placeholder="ivanov"></div>
      <div class="ff full"><label>Пароль <span id="u-pw-hint" style="color:#6b7a6b;">(оставьте пустым чтобы не менять)</span></label>
        <input type="password" id="u-pw" placeholder="минимум 6 символов"></div>
    </div>
    <div class="modal-footer">
      <button class="btn btn-danger btn-sm" id="u-del-btn" style="display:none;margin-right:auto;" onclick="deleteUser()">🗑 Деактивировать</button>
      <button class="btn btn-secondary" onclick="closeUserModal()">Отмена</button>
      <button class="btn btn-primary" onclick="saveUser()">Сохранить</button>
    </div>
  </div>
</div>

<script>
const TOKEN_KEY = 'agro_jwt';
let _token = sessionStorage.getItem(TOKEN_KEY) || localStorage.getItem(TOKEN_KEY);
let _tenants = [];
let _editUserId = null;
let _editTenantId = null;

// Проверяем авторизацию
if(!_token) { window.location.href = '/login'; }
const payload = JSON.parse(atob(_token.split('.')[1]));
if(payload.role !== 'superadmin') { alert('Только для суперадмина'); window.location.href = '/login'; }
document.getElementById('admin-name').textContent = '👤 ' + (payload.login || 'superadmin');

function headers() {
  return {'Content-Type':'application/json', 'Authorization': `Bearer ${_token}`};
}

function showMsg(id, msg, type='error') {
  const el = document.getElementById(id);
  if(!el) return;
  el.className = type === 'error' ? 'error' : 'success';
  el.textContent = msg;
  el.style.display = 'block';
  setTimeout(() => el.style.display='none', 4000);
}

function switchTab(tab, btn) {
  document.querySelectorAll('.tab').forEach(t=>t.classList.remove('active'));
  document.querySelectorAll('.panel').forEach(p=>p.classList.remove('active'));
  btn.classList.add('active');
  document.getElementById('panel-'+tab).classList.add('active');
  if(tab==='tenants') loadTenants();
  if(tab==='users') { loadTenants(); loadUsers(); }
  if(tab==='stats') loadStats();
}

// ── TENANTS ─────────────────────────────────────────────────────────────

async function loadTenants() {
  try {
    const r = await fetch('/api/auth/tenants', {headers: headers()});
    const data = await r.json();
    _tenants = data.tenants || [];
    document.getElementById('tenants-count').textContent = `${_tenants.length} хозяйств в системе`;
    renderTenants();
    updateTenantSelects();
  } catch(e) { console.error(e); }
}

function renderTenants() {
  const grid = document.getElementById('tenants-grid');
  if(!_tenants.length) {
    grid.innerHTML = '<div style="color:#6b7a6b;font-size:13px;">Нет хозяйств</div>';
    return;
  }
  grid.innerHTML = _tenants.map(t => `
    <div class="card">
      <div class="card-header">
        <div>
          <div class="card-title">${t.name}</div>
          <div style="font-size:11px;color:#6b7a6b;margin-top:3px;">ID: ${t.id}</div>
        </div>
        <div style="display:flex;gap:6px;align-items:center;">
          <span class="badge ${t.plan==='pro'?'badge-pro':'badge-basic'}">${t.plan?.toUpperCase()}</span>
          <button class="btn btn-secondary btn-sm" onclick="openTenantModal('${t.id}')">✏️</button>
        </div>
      </div>
      <div style="display:grid;grid-template-columns:1fr 1fr;gap:6px;font-size:11px;color:#8a9a8a;">
        ${t.fc_station_orchard?`<div>🍒 Орчард: <strong>${t.fc_station_orchard}</strong></div>`:'<div style="color:#3a4a3a;">🍒 Метеостанция не задана</div>'}
        ${t.fc_station_veg?`<div>🥕 Овощи: <strong>${t.fc_station_veg}</strong></div>`:'<div style="color:#3a4a3a;">🥕 Метеостанция не задана</div>'}
        <div>📍 ${t.lat?.toFixed(4)}, ${t.lon?.toFixed(4)}</div>
        <div style="color:${t.active?'#4ade80':'#f87171'}">${t.active?'✅ Активно':'❌ Отключено'}</div>
      </div>
      <div style="margin-top:10px;display:flex;gap:6px;">
        <button class="btn btn-secondary btn-sm" onclick="loadUsersForTenant('${t.id}')">👥 Пользователи</button>
        <a href="/orchard" style="text-decoration:none;"><button class="btn btn-secondary btn-sm">🍒 Орчард</button></a>
      </div>
    </div>`).join('');
}

function updateTenantSelects() {
  const filter = document.getElementById('users-tenant-filter');
  const uTenant = document.getElementById('u-tenant');
  const opts = _tenants.map(t=>`<option value="${t.id}">${t.name}</option>`).join('');
  if(filter) filter.innerHTML = '<option value="">Все хозяйства</option>' + opts;
  if(uTenant) uTenant.innerHTML = opts;
}

function openTenantModal(id) {
  _editTenantId = id || null;
  const t = id ? _tenants.find(x=>x.id===id) : null;
  document.getElementById('tenant-modal-title').textContent = t ? `✏️ ${t.name}` : '🏢 Новое хозяйство';
  document.getElementById('t-id-edit').value = t?.id || '';
  document.getElementById('t-id').value = t?.id || '';
  document.getElementById('t-id').disabled = !!t;
  document.getElementById('t-name').value = t?.name || '';
  document.getElementById('t-plan').value = t?.plan || 'basic';
  document.getElementById('t-fc-orchard').value = t?.fc_station_orchard || '';
  document.getElementById('t-fc-veg').value = t?.fc_station_veg || '';
  document.getElementById('t-lat').value = t?.lat || '';
  document.getElementById('t-lon').value = t?.lon || '';
  document.getElementById('owner-section').style.display = t ? 'none' : 'block';
  document.getElementById('tenant-msg').style.display = 'none';
  document.getElementById('modal-tenant').classList.add('open');
}

function closeTenantModal() {
  document.getElementById('modal-tenant').classList.remove('open');
}

async function saveTenant() {
  const isEdit = !!_editTenantId;
  const body = {
    name:               document.getElementById('t-name').value.trim(),
    plan:               document.getElementById('t-plan').value,
    fc_station_orchard: document.getElementById('t-fc-orchard').value.trim(),
    fc_station_veg:     document.getElementById('t-fc-veg').value.trim(),
    lat:                parseFloat(document.getElementById('t-lat').value) || 47,
    lon:                parseFloat(document.getElementById('t-lon').value) || 28,
  };
  if(!body.name) { showMsg('tenant-msg','Введите название'); return; }

  try {
    let r;
    if(isEdit) {
      r = await fetch(`/api/auth/tenants/${_editTenantId}`, {method:'PUT', headers:headers(), body:JSON.stringify(body)});
    } else {
      const id = document.getElementById('t-id').value.trim().toLowerCase().replace(/\s/g,'_');
      const ownerLogin = document.getElementById('t-owner-login').value.trim();
      const ownerPassword = document.getElementById('t-owner-pw').value;
      if(!id) { showMsg('tenant-msg','Введите ID'); return; }
      if(!ownerLogin || !ownerPassword) { showMsg('tenant-msg','Введите логин и пароль владельца'); return; }
      r = await fetch('/api/auth/tenants', {method:'POST', headers:headers(), body:JSON.stringify({...body, id, ownerLogin, ownerPassword})});
    }
    const data = await r.json();
    if(!r.ok || !data.ok) { showMsg('tenant-msg', data.error || 'Ошибка'); return; }
    closeTenantModal();
    loadTenants();
  } catch(e) { showMsg('tenant-msg', e.message); }
}

// ── USERS ────────────────────────────────────────────────────────────────

async function loadUsers() {
  const tenantId = document.getElementById('users-tenant-filter')?.value || '';
  try {
    const url = '/api/auth/users' + (tenantId ? `?tenantId=${tenantId}` : '');
    const r = await fetch(url, {headers: headers()});
    const data = await r.json();
    renderUsers(data.users || []);
  } catch(e) { console.error(e); }
}

async function loadUsersForTenant(tenantId) {
  switchTab('users', document.querySelectorAll('.tab')[1]);
  document.getElementById('users-tenant-filter').value = tenantId;
  loadUsers();
}

const ROLE_LABELS = {owner:'Владелец', agronomist:'Агроном', director:'Директор', operator:'Оператор'};
const ROLE_CLASSES = {owner:'role-owner', agronomist:'role-agronomist', director:'role-director', operator:'role-operator'};
const ROLE_ICONS = {owner:'👑', agronomist:'🌱', director:'📊', operator:'🔧'};

function renderUsers(users) {
  const el = document.getElementById('users-list');
  if(!users.length) { el.innerHTML='<div style="color:#6b7a6b;font-size:13px;">Нет пользователей</div>'; return; }
  el.innerHTML = users.map(u => `
    <div class="user-row">
      <div class="user-avatar">${ROLE_ICONS[u.role]||'👤'}</div>
      <div style="flex:1;">
        <div style="font-size:13px;font-weight:600;">${u.name||u.login}</div>
        <div style="font-size:11px;color:#6b7a6b;">@${u.login} · ${u.last_login?'Вход: '+u.last_login.slice(0,10):'Ещё не входил'}</div>
      </div>
      <span class="role-badge ${ROLE_CLASSES[u.role]||''}">${ROLE_LABELS[u.role]||u.role}</span>
      <span style="font-size:11px;color:${u.active?'#4ade80':'#f87171'}">${u.active?'●':'○'}</span>
      <button class="btn btn-secondary btn-sm" onclick="openUserModal('${u.id}','${u.tenant_id||''}','${u.login}','${u.name||''}','${u.role}')">✏️</button>
    </div>`).join('');
}

function openUserModal(id, tenantId, login, name, role) {
  _editUserId = id || null;
  document.getElementById('user-modal-title').textContent = id ? `✏️ ${name||login}` : '👤 Новый пользователь';
  document.getElementById('u-id').value = id || '';
  document.getElementById('u-name').value = name || '';
  document.getElementById('u-login').value = login || '';
  document.getElementById('u-pw').value = '';
  document.getElementById('u-role').value = role || 'agronomist';
  document.getElementById('u-pw-hint').style.display = id ? 'inline' : 'none';
  document.getElementById('u-del-btn').style.display = id ? 'block' : 'none';
  document.getElementById('user-msg').style.display = 'none';
  if(tenantId && document.getElementById('u-tenant')) document.getElementById('u-tenant').value = tenantId;
  document.getElementById('modal-user').classList.add('open');
}

function closeUserModal() {
  document.getElementById('modal-user').classList.remove('open');
}

async function saveUser() {
  const body = {
    name:     document.getElementById('u-name').value.trim(),
    login:    document.getElementById('u-login').value.trim(),
    role:     document.getElementById('u-role').value,
    password: document.getElementById('u-pw').value || undefined,
    active:   true,
    tenantId: document.getElementById('u-tenant').value,
  };
  if(!body.login) { showMsg('user-msg','Введите логин'); return; }
  if(!_editUserId && !body.password) { showMsg('user-msg','Введите пароль'); return; }

  try {
    const url = _editUserId ? `/api/auth/users/${_editUserId}` : '/api/auth/users';
    const method = _editUserId ? 'PUT' : 'POST';
    const r = await fetch(url, {method, headers:headers(), body:JSON.stringify(body)});
    const data = await r.json();
    if(!r.ok || !data.ok) { showMsg('user-msg', data.error || 'Ошибка'); return; }
    closeUserModal();
    loadUsers();
  } catch(e) { showMsg('user-msg', e.message); }
}

async function deleteUser() {
  if(!_editUserId || !confirm('Деактивировать пользователя?')) return;
  try {
    await fetch(`/api/auth/users/${_editUserId}`, {method:'DELETE', headers:headers()});
    closeUserModal();
    loadUsers();
  } catch(e) { console.error(e); }
}

// ── STATS ────────────────────────────────────────────────────────────────

async function loadStats() {
  try {
    const r = await fetch('/api/auth/tenants', {headers:headers()});
    const data = await r.json();
    const tenants = data.tenants || [];
    document.getElementById('stat-tenants').textContent = tenants.length;
    document.getElementById('stat-active').textContent = tenants.filter(t=>t.active).length;
    document.getElementById('stat-pro').textContent = tenants.filter(t=>t.plan==='pro').length;

    const ur = await fetch('/api/auth/users', {headers:headers()});
    const ud = await ur.json();
    document.getElementById('stat-users').textContent = (ud.users||[]).length;
  } catch(e) { console.error(e); }
}

function logout() {
  sessionStorage.clear();
  localStorage.removeItem(TOKEN_KEY);
  window.location.href = '/login';
}

// Инициализация
loadTenants();
</script>
</body>
</html>
