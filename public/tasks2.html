<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Журнал работ — Smart Agro</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:sans-serif;background:#f5f4f0;color:#1a1a18}
.header{background:#fff;border-bottom:1px solid #e2e0d8;padding:0 20px;display:flex;align-items:center;height:52px;gap:12px}
.logo{font-weight:700;color:#1d6a4a;font-size:15px;margin-right:16px}
.header h1{font-size:15px;font-weight:600;flex:1}
.btn{padding:7px 14px;font-size:13px;border-radius:7px;border:1px solid #e2e0d8;background:#fff;cursor:pointer;text-decoration:none;color:#1a1a18}
.btn-green{background:#1d6a4a;color:#fff;border-color:#1d6a4a}
.filters{padding:10px 20px;display:flex;gap:6px;background:#fff;border-bottom:1px solid #e2e0d8;flex-wrap:wrap}
.fb{padding:4px 12px;font-size:12px;border-radius:20px;border:1px solid #e2e0d8;background:none;cursor:pointer}
.fb.active{background:#1d6a4a;color:#fff;border-color:#1d6a4a}
.main{padding:16px 20px;max-width:860px;margin:0 auto}
.card{background:#fff;border:1px solid #e2e0d8;border-radius:10px;padding:14px 18px;margin-bottom:10px}
.card.s-new{border-left:3px solid #378add}
.card.s-accepted{border-left:3px solid #b85c00}
.card.s-in_progress{border-left:3px solid #2d9566}
.card.s-done{border-left:3px solid #639922}
.card.s-closed{border-left:3px solid #b4b2a9}
.card.s-problem{border-left:3px solid #c0392b}
.card-title{font-size:15px;font-weight:600;margin-bottom:3px}
.card-sub{font-size:12px;color:#6b6a64}
.badge{display:inline-block;padding:2px 8px;border-radius:20px;font-size:11px;font-weight:600;margin-right:4px;margin-top:6px}
.b-blue{background:#e8f1f8;color:#1a4f7a}
.b-amber{background:#fef3e2;color:#b85c00}
.b-green{background:#e8f4ee;color:#1d6a4a}
.b-gray{background:#f0efe9;color:#6b6a64}
.b-red{background:#fdecea;color:#c0392b}
.b-lime{background:#eaf3de;color:#27500a}
.hr{border-top:1px solid #e2e0d8;margin:10px 0}
.grid{display:grid;grid-template-columns:repeat(4,1fr);gap:8px;font-size:12px}
.grid .l{color:#6b6a64;margin-bottom:2px;font-size:11px}
.grid .v{font-weight:500}
.actions{display:flex;gap:6px;flex-wrap:wrap;margin-top:10px}
.prob{background:#fdecea;border:1px solid #f5c6c2;border-radius:7px;padding:8px 12px;margin-top:8px;font-size:13px;color:#c0392b}
.empty{text-align:center;padding:60px 20px;color:#6b6a64}
.overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,0.4);z-index:100;align-items:center;justify-content:center;padding:16px}
.overlay.open{display:flex}
.modal{background:#fff;border-radius:12px;padding:22px;width:100%;max-width:560px;max-height:90vh;overflow-y:auto;box-shadow:0 20px 60px rgba(0,0,0,0.15)}
.modal h2{font-size:16px;font-weight:600;margin-bottom:16px}
.fg{margin-bottom:12px}
.fg label{display:block;font-size:11px;font-weight:600;color:#6b6a64;margin-bottom:4px;text-transform:uppercase}
.fg select,.fg input,.fg textarea{width:100%;padding:8px 10px;border:1px solid #e2e0d8;border-radius:7px;font-size:13px;background:#f5f4f0;outline:none}
.fg select:focus,.fg input:focus{border-color:#2d9566}
.row2{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.sec{font-size:11px;font-weight:600;color:#6b6a64;text-transform:uppercase;letter-spacing:.5px;margin:14px 0 8px}
.mf{display:flex;gap:8px;justify-content:flex-end;margin-top:16px;padding-top:14px;border-top:1px solid #e2e0d8}
.toast{position:fixed;bottom:20px;right:20px;background:#1a1a18;color:#fff;padding:9px 16px;border-radius:7px;font-size:13px;z-index:200;opacity:0;transition:all .2s;pointer-events:none}
.toast.show{opacity:1}
.loading{text-align:center;padding:20px;color:#6b6a64;font-size:13px}
</style>
</head>
<body>
<div class="header">
  <div class="logo">SmartAgro</div>
  <h1>Журнал работ</h1>
  <a class="btn" href="/staff-equipment.html">Справочники</a>
  <a class="btn" href="/vegetable">Vegetable</a>
  <button class="btn btn-green" onclick="openModal()">+ Новое задание</button>
</div>
<div class="filters">
  <button class="fb active" onclick="filt('all',this)">Все <span id="ca">0</span></button>
  <button class="fb" onclick="filt('new',this)">Новые <span id="cn">0</span></button>
  <button class="fb" onclick="filt('accepted',this)">Принято <span id="cac">0</span></button>
  <button class="fb" onclick="filt('in_progress',this)">В работе <span id="cip">0</span></button>
  <button class="fb" onclick="filt('done',this)">Выполнено <span id="cd">0</span></button>
  <button class="fb" onclick="filt('problem',this)">Проблемы <span id="cp">0</span></button>
  <button class="fb" onclick="filt('closed',this)">Закрыто <span id="cc">0</span></button>
</div>
<div class="main"><div id="list"></div></div>

<div class="overlay" id="m-task">
<div class="modal">
  <h2>Новое задание</h2>
  <div id="m-loading" class="loading">Загрузка...</div>
  <div id="m-form" style="display:none">
    <div class="sec">Что делать</div>
    <div class="row2">
      <div class="fg"><label>Тип работы *</label><select id="t-wt"></select></div>
      <div class="fg"><label>Участок</label><select id="t-par"></select></div>
    </div>
    <div class="fg"><label>Описание</label><textarea id="t-desc" rows="2"></textarea></div>
    <div class="fg"><label>Срок</label><input type="date" id="t-due"></div>
    <div class="sec">Кто выполняет</div>
    <div class="row2">
      <div class="fg"><label>Создал *</label><select id="t-cr"></select></div>
      <div class="fg"><label>Исполнитель *</label><select id="t-as"></select></div>
    </div>
    <div class="fg"><label>Механизатор</label><select id="t-me"></select></div>
    <div class="sec">Техника</div>
    <div class="row2">
      <div class="fg"><label>Техника</label><select id="t-eq"></select></div>
      <div class="fg"><label>Навесное</label><select id="t-at"></select></div>
    </div>
    <div class="fg"><label>Примечание</label><input type="text" id="t-no"></div>
    <div class="mf">
      <button class="btn" onclick="closeModal()">Отмена</button>
      <button class="btn btn-green" onclick="saveTask()">Создать + Telegram</button>
    </div>
  </div>
</div>
</div>

<div class="overlay" id="m-prob">
<div class="modal" style="max-width:400px">
  <h2>Сообщить о проблеме</h2>
  <input type="hidden" id="prob-id">
  <div class="fg"><label>Проблема</label><textarea id="prob-txt" rows="3"></textarea></div>
  <div class="mf">
    <button class="btn" onclick="closeProb()">Отмена</button>
    <button class="btn" style="background:#fdecea;color:#c0392b;border-color:#f5c6c2" onclick="saveProb()">Отправить</button>
  </div>
</div>
</div>

<div class="toast" id="toast"></div>

<script>
const SL={new:'Новое',accepted:'Принято',in_progress:'В работе',done:'Выполнено',closed:'Закрыто',problem:'Проблема'};
const SB=
