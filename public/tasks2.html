<!DOCTYPE html>
<html lang="ru">
<head><meta charset="UTF-8"><title>Тест</title></head>
<body>
<h1>Тест селектов</h1>
<select id="staff-select"><option>Загрузка...</option></select>
<script>
fetch('/api/staff').then(r=>r.json()).then(data=>{
  document.getElementById('staff-select').innerHTML = data.map(s=>`<option>${s.name}</option>`).join('');
}).catch(e=>{ document.body.innerHTML += '<p style="color:red">Ошибка: '+e.message+'</p>'; });
</script>
</body>
</html>
